<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support | BaggaD119</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Literata:opsz,wght@7..72,500;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain"></div>
  <header class="site-header">
    <div class="container header-wrap">
      <a class="brand" href="index.html#hero">BaggaD119.</a>
      <nav>
        <a href="index.html#projects">Projects</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
        <a href="done.html">Give</a>
      </nav>
    </div>
  </header>

  <main class="support-main">
    <section class="support-section">
      <div class="container support-wrap reveal">
        <p class="eyebrow">Support</p>
        <h1>Support My Work</h1>
        <p class="lead">
          If you like what I am building, you can support me directly with Paystack.
        </p>
        <form id="supportForm" class="support-form">
          <label>
            Email
            <input id="supportEmail" type="email" required placeholder="you@example.com" />
          </label>
          <label>
            Amount (GHS)
            <input id="supportAmount" type="number" min="1" step="1" required placeholder="50" />
          </label>
          <label>
            Name (optional)
            <input id="supportName" type="text" placeholder="Your name" />
          </label>
          <label>
            Message (optional)
            <textarea id="supportMessage" rows="3" placeholder="Keep building amazing things."></textarea>
          </label>
          <div class="support-actions">
            <button id="supportSubmit" class="btn btn-primary" type="submit">Give via Paystack</button>
            <a class="btn btn-ghost" href="mailto:opokuamanorsolomon@gmail.com">Contact Me</a>
          </div>
          <p id="supportStatus" class="support-status" hidden></p>
        </form>
        <p class="support-note">You will be redirected to Paystack checkout to complete payment securely.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>&copy; <span id="year"></span> BaggaD119. Crafted with precision.</p>
      <a class="btn btn-ghost" href="index.html">Back to Portfolio</a>
    </div>
  </footer>

  <script src="give.js"></script>
</body>
</html>
